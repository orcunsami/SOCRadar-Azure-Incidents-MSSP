id: b8c9d0e1-f2a3-4b5c-6d7e-8f9a0b1c2d3e
name: SOCRadar MSSP Tenant Health
description: |
  'Monitors alarm import health per managed tenant to detect gaps or failures in the import process.'
description-detailed: |
  'This query provides a health overview of alarm imports for each managed tenant.
  It shows the last alarm timestamp, total alarm count, and hours since the last import for each company.
  A large gap in imports may indicate an API key issue, tenant configuration problem, or SOCRadar platform issue for that specific tenant.'
requiredDataConnectors: []
tactics:
  - Discovery
query: |
  SOCRadar_Alarms_CL
  | summarize LastAlarm=max(TimeGenerated), TotalAlarms=count(), HighSeverity=countif(Severity in ('HIGH', 'CRITICAL')) by CompanyName, CompanyId
  | extend HoursSinceLastAlarm=datetime_diff('hour', now(), LastAlarm)
  | order by HoursSinceLastAlarm desc
version: 1.0.0
