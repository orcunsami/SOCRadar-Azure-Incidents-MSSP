id: 9e4f5a6b-c7d8-4e9f-0a1b-2c3d4e5f6a7b
name: SOCRadar MSSP Cross-Tenant Correlation
description: |
  'Identifies threats affecting multiple managed tenants simultaneously, indicating widespread campaigns.'
description-detailed: |
  'This query identifies alarm types that appear across multiple managed tenants within the same time window.
  When the same threat type affects multiple companies, it may indicate a coordinated attack campaign or widespread vulnerability exploitation that requires immediate MSSP attention.'
requiredDataConnectors: []
tactics:
  - Discovery
  - Impact
query: |
  SOCRadar_Alarms_CL
  | summarize Companies=dcount(CompanyName), CompanyList=make_set(CompanyName), AlarmCount=count() by AlarmMainType
  | where Companies > 1
  | order by Companies desc, AlarmCount desc
version: 1.0.0
